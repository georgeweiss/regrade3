<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Regra de 3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: #080808 !important;
min-height: 100vh;
font-family: ‘Syne’, sans-serif;
display: flex;
align-items: center;
justify-content: center;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 55% 40% at 30% 10%, rgba(200,210,230,0.05) 0%, transparent 60%),
radial-gradient(ellipse 40% 50% at 70% 90%, rgba(180,190,210,0.04) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}

.card {
position: relative;
z-index: 1;
width: min(400px, 96vw);
background: #0e0e0e;
border: 1px solid #252525;
border-radius: 24px;
padding: 28px 20px 24px;
box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes rise {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

.logo-wrap {
text-align: center;
margin-bottom: 20px;
}

.logo-wrap img {
width: 180px;
height: auto;
display: block;
margin: 0 auto;
mix-blend-mode: screen;
}

/* ── PROP GRID: 2 rows, each row = [field] [arrow] [field] ── */
.prop-row {
display: flex;
align-items: flex-end;
gap: 0;
margin-bottom: 10px;
}

.prop-row:last-child {
margin-bottom: 0;
}

.field-wrap {
flex: 1;
display: flex;
flex-direction: column;
gap: 5px;
min-width: 0;
position: relative;
}

.field-label {
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
letter-spacing: 0.12em;
color: #383838;
padding-left: 2px;
white-space: nowrap;
}

.field-label.active-label {
color: #8a9ab8;
}

.display-field {
width: 100%;
background: #141414;
border: 1.5px solid #222;
border-radius: 12px;
color: #e8ecf4;
font-family: ‘JetBrains Mono’, monospace;
font-size: 20px;
font-weight: 700;
padding: 13px 8px;
text-align: center;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
cursor: pointer;
user-select: none;
-webkit-user-select: none;
transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
min-height: 52px;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
}

.display-field.active {
border-color: #8a9ab8;
background: #101010;
box-shadow: 0 0 0 3px rgba(138,154,184,0.12);
}

.display-field.result-field {
background: linear-gradient(135deg, #0f1218, #131720);
border-color: #1e2535;
color: #8a9ab8;
cursor: default;
}

.display-field.result-field.has-value {
color: #e0eaff;
border-color: #2a3550;
box-shadow: 0 0 20px rgba(160,180,230,0.08);
}

.arrow-wrap {
width: 44px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
padding-bottom: 2px;
/* align with center of input (input ~52px tall + 15px label) */
padding-top: 20px;
}

.x-badge {
position: absolute;
top: 0px;
right: -4px;
width: 18px;
height: 18px;
background: linear-gradient(135deg, #c8d4f0, #8a9ab8);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘JetBrains Mono’, monospace;
font-size: 9px;
font-weight: 700;
color: #080808;
z-index: 2;
box-shadow: 0 0 8px rgba(200,212,240,0.3);
}

.props-wrap {
margin-bottom: 16px;
}

/* Result panel */
.result-display {
margin-bottom: 14px;
background: linear-gradient(135deg, #0f1218, #131720);
border: 1px solid #1e2535;
border-radius: 14px;
padding: 13px 16px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
opacity: 0;
transform: translateY(4px);
transition: opacity 0.3s, transform 0.3s;
}

.result-display.visible {
opacity: 1;
transform: translateY(0);
}

.result-display .label {
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
color: #8a9ab8;
letter-spacing: 0.1em;
flex-shrink: 0;
}

.result-display .value {
font-family: ‘JetBrains Mono’, monospace;
font-size: 22px;
font-weight: 700;
background: linear-gradient(135deg, #ffffff, #c8d4f0);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-align: right;
word-break: break-all;
min-width: 0;
}

/* Numpad */
.numpad {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 7px;
margin-bottom: 12px;
}

.key {
background: #161616;
border: 1px solid #222;
border-radius: 10px;
color: #c8d0e0;
font-family: ‘JetBrains Mono’, monospace;
font-size: 18px;
font-weight: 700;
padding: 15px 0;
text-align: center;
cursor: pointer;
user-select: none;
-webkit-user-select: none;
-webkit-tap-highlight-color: transparent;
transition: background 0.08s, transform 0.08s, border-color 0.08s;
}

.key:active, .key.pressed {
background: #222;
border-color: #8a9ab8;
transform: scale(0.94);
color: #fff;
}

.key.key-dot { color: #8a9ab8; font-size: 22px; }
.key.key-del { color: #8a9ab8; font-size: 18px; }

.btn-reset {
width: 100%;
padding: 15px;
background: linear-gradient(135deg, #1e2535, #252d40);
border: 1px solid #2a3550;
border-radius: 14px;
font-family: ‘Syne’, sans-serif;
font-size: 15px;
font-weight: 700;
color: #8a9ab8;
letter-spacing: 0.06em;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
transition: transform 0.15s, color 0.15s;
}

.btn-reset:active {
transform: scale(0.98);
color: #c8d4f0;
}

.formula {
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
color: #222;
text-align: center;
margin-top: 12px;
letter-spacing: 0.05em;
}
</style>

</head>
<body>

  </div>

  <div class="result-display" id="resultBox">
    <span class="label">X =</span>
    <span class="value" id="resultVal">—</span>
  </div>

  <div class="numpad">
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key key-zero" onclick="pressKey('0')">0</div>
    <div class="key key-dot" onclick="pressKey('.')">.</div>
    <div class="key key-del" onclick="pressKey('del')">&#x232B;</div>
  </div>

<button class="btn-reset" onclick="resetAll()">Limpar Tudo</button>

  <p class="formula">x = (b x c) / a</p>
</div>

<script>
  const fields = ['a', 'b', 'c'];
  const values = { a: '', b: '', c: '' };
  let activeField = 'a';

  function setActive(field) {
    activeField = field;
    fields.forEach(function(f) {
      var disp = document.getElementById('disp-' + f);
      var lbl  = document.getElementById('lbl-' + f);
      if (f === field) {
        disp.classList.add('active');
        if (lbl) lbl.classList.add('active-label');
      } else {
        disp.classList.remove('active');
        if (lbl) lbl.classList.remove('active-label');
      }
    });
  }

  function pressKey(key) {
    var keys = document.querySelectorAll('.key');
    keys.forEach(function(k) {
      if (
        k.textContent.trim() === key ||
        (key === 'del' && k.classList.contains('key-del'))
      ) {
        k.classList.add('pressed');
        setTimeout(function() { k.classList.remove('pressed'); }, 120);
      }
    });

    var val = values[activeField];

    if (key === 'del') {
      val = val.slice(0, -1);
    } else if (key === '.') {
      if (val.includes('.')) return;
      if (val === '') val = '0';
      val = val + '.';
    } else {
      var next = (val === '0' || val === '') ? key : val + key;
      if (next.replace('.', '').length > 12) return;
      val = next;
    }

    values[activeField] = val;
    updateDisplay(activeField);
    calc();
  }

  function updateDisplay(field) {
    var disp = document.getElementById('disp-' + field);
    var val  = values[field];
    disp.textContent = (val === '' || val === '0.' ? (val === '0.' ? '0.' : '—') : val);
    disp.textContent = val === '' ? '—' : val;
  }

  function parseVal(v) {
    return parseFloat(v.replace(',', '.'));
  }

  function formatResult(num) {
    if (Number.isInteger(num)) return num.toString();
    return parseFloat(num.toFixed(4)).toString();
  }

  function calc() {
    var a = parseVal(values.a);
    var b = parseVal(values.b);
    var c = parseVal(values.c);
    var xDisp     = document.getElementById('disp-x');
    var resultBox = document.getElementById('resultBox');
    var resultVal = document.getElementById('resultVal');

    var aOk = values.a !== '' && !isNaN(a) && a !== 0;
    var bOk = values.b !== '' && !isNaN(b);
    var cOk = values.c !== '' && !isNaN(c);

    if (aOk && bOk && cOk) {
      var x         = (b * c) / a;
      var formatted = formatResult(x);
      xDisp.textContent = formatted;
      xDisp.classList.add('has-value');
      resultVal.textContent = formatted;
      resultBox.classList.add('visible');
    } else {
      xDisp.textContent = '—';
      xDisp.classList.remove('has-value');
      resultBox.classList.remove('visible');
    }
  }

  function resetAll() {
    values.a = ''; values.b = ''; values.c = '';
    fields.forEach(function(f) { updateDisplay(f); });
    document.getElementById('disp-x').textContent = '—';
    document.getElementById('disp-x').classList.remove('has-value');
    document.getElementById('resultBox').classList.remove('visible');
    setActive('a');
  }

  setActive('a');
</script>

</body>
